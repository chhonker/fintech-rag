# spring-boot config file
spring:
  application:
    name: fintech-rag
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  flyway:
    schemas: fintech_app
    create-schemas: true
  ai:
    google:
      genai:
        api-key: ${GEMINI_API_KEY}
        project-id: ${GEMINI_PROJECT_ID}
        embedding:
          api-key: ${GEMINI_API_KEY}
          project-id: ${GEMINI_PROJECT_ID}
          text:
            options:
              model: gemini-embedding-001
              dimensions: 768
    mcp:
      server:
        name: fintech-rag-mcp
        version: 1.0.0
        type: SYNC

# Expose Prometheus so Spring AI's gen_ai.client.token.usage metrics can be scraped.
management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus

# ── Token metering & per-user quota ───────────────────────────────────────────
app:
  security:
    # Map of API key (the X-API-Key header value) → userId.
    # Demo keys only — externalize via env/secret manager for production.
    api-keys:
      "demo-key-alice": alice
      "demo-key-bob": bob
  quota:
    # Cheap burst guard: max requests per rolling minute per user.
    max-requests-per-minute: 20
    # Real cost guard: max total tokens per rolling 24h per user.
    max-tokens-per-day: 100000

# Models for dispute resolution and policy resolution

# ─── Learning: YAML-driven AI Chat Model Configuration ───────────────────────
#
# Spring AI can auto-configure the ChatModel entirely from YAML — no Java code
# needed for basic model selection and sampling settings. Example:
#
# spring:
#   ai:
#     google:
#       genai:
#         chat:
#           options:
#             model: gemini-2.5-flash     # which Gemini model to call
#             temperature: 0.2            # 0.0 = deterministic, 1.0 = creative
#             max-output-tokens: 2048     # cap the response length
#             top-p: 0.95                 # nucleus sampling threshold
#
# WHY we use AiConfig.java instead:
#   The three things that make this app smart CANNOT be expressed in YAML —
#   they always require code:
#
#   1. System prompts  (defaultSystem)
#        — the AI's persona and rules ("You are a Grievance Officer…")
#        — different for DisputeResolutionService vs PolicyQueryService
#
#   2. Advisors        (QuestionAnswerAdvisor, MessageChatMemoryAdvisor)
#        — QuestionAnswerAdvisor: performs vector similarity search and injects
#          the top-K relevant document chunks into every prompt (RAG)
#        — MessageChatMemoryAdvisor: injects prior conversation turns so the
#          model remembers what the user said earlier (multi-turn memory)
#
#   3. Tools           (LedgerTool, TransactionTool)
#        — Spring @Tool methods the model can call at runtime (function calling)
#        — wired by type, not by name — YAML has no way to express this
#
#   AiConfig.java is a standard @Configuration class that produces @Bean objects
#   for each of these. This keeps all AI wiring in one place, separate from
#   business logic, and makes each client independently testable.
# ─────────────────────────────────────────────────────────────────────────────
